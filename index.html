<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>made by kumail and nathan is chud</title>

<style>
:root{--bg:#0a0a0a;--panel:#121212;--accent:#ffd400;--text:#fff}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
  height:100dvh;
}

/* animated background unchanged */
body::before,body::after{content:"";position:fixed;width:300%;height:300%;z-index:0}
body::before{background:radial-gradient(circle at 20% 30%, rgba(255,212,0,0.25) 2px, transparent 60px);animation:float1 25s linear infinite alternate}
body::after{background:radial-gradient(circle at 80% 20%, rgba(255,212,0,0.2) 2px, transparent 90px);animation:float2 35s linear infinite alternate}
@keyframes float1{from{transform:translate(0,0)}to{transform:translate(-200px,-150px)}}
@keyframes float2{from{transform:translate(0,0)}to{transform:translate(150px,120px)}}

.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  height:100%;
}

/* username */
.username-set{padding:10px;background:var(--panel)}
.username-set input{width:100%;padding:10px;border:none;border-radius:20px;background:#1c1c1c;color:white}

/* chat layout fix */
.chat{
  display:flex;
  flex-direction:column;
  height:100%;
  min-height:0;
}

.messages{
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.message{display:flex;gap:10px;max-width:650px;width:100%;margin:8px 0}
.avatar{width:36px;height:36px;border-radius:50%;background:#222}

.bubble{
  background:var(--panel);
  padding:12px 16px;
  border-radius:20px;
  width:100%;
}

.username{color:var(--accent);font-size:12px;margin-bottom:4px}
.msg-text{font-size:16px}

.bubble img{
  margin-top:8px;
  max-width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* input always visible */
.input-area{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:var(--panel);
  position:sticky;
  bottom:0;
}

.profile-preview{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  cursor:pointer;
}

.input-box{
  flex:1;
  display:flex;
  background:#1c1c1c;
  border-radius:30px;
  padding:6px 10px;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  color:white;
}

.plus{
  width:34px;
  height:34px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

button{background:var(--accent);border:none;border-radius:20px;padding:10px}

.hidden-file{display:none}

/* image modal */
#imageModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
  cursor:zoom-out;
}

#imageModal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="chat">

<div class="username-set">
  <input type="text" id="usernameInput" placeholder="Enter username">
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <img id="profilePreview" class="profile-preview">

  <div class="input-box">
    <input type="text" id="messageInput" placeholder="Type message">
    <div class="plus" onclick="document.getElementById('imageInput').click()">+</div>
  </div>

  <input type="file" id="imageInput" class="hidden-file">
  <input type="file" id="profileInput" class="hidden-file">
  <button onclick="sendMessage()">Send</button>
</div>

</div>
</div>

<!-- modal BEFORE script -->
<div id="imageModal">
  <img id="modalImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const firebaseConfig={apiKey:"AIza...",authDomain:"chat-a48a1.firebaseapp.com",projectId:"chat-a48a1"}
const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const supabase=createClient("https://gsahyfawfxjpfxcqpjvk.supabase.co","YOUR_KEY")

let profilePic=""

// username save
const usernameInput=document.getElementById('usernameInput')
const saved=localStorage.getItem("chatUsername")
if(saved) usernameInput.value=saved

usernameInput.addEventListener("input",()=>{
  localStorage.setItem("chatUsername",usernameInput.value)
})

// modal
const modal=document.getElementById("imageModal")
const modalImg=document.getElementById("modalImg")

function openImage(src){
  modal.style.display="flex"
  modalImg.src=src
}

modal.onclick=()=>modal.style.display="none"

// profile upload
document.getElementById('profileInput').addEventListener('change',async function(){
  const file=this.files[0]
  if(file){
    const name=Date.now()+"_"+file.name
    await supabase.storage.from('images').upload(name,file)
    const { data }=supabase.storage.from('images').getPublicUrl(name)
    profilePic=data.publicUrl
    document.getElementById('profilePreview').src=profilePic
  }
})

// send
window.sendMessage=async function(){
  const text=document.getElementById('messageInput').value
  const file=document.getElementById('imageInput').files[0]
  const username=usernameInput.value||"Anonymous"

  let imageUrl=""

  if(file){
    const name=Date.now()+"_"+file.name
    await supabase.storage.from('images').upload(name,file)
    const { data }=supabase.storage.from('images').getPublicUrl(name)
    imageUrl=data.publicUrl
  }

  if(!text&&!imageUrl)return

  await addDoc(collection(db,"messages"),{
    user:username,
    text:text,
    image:imageUrl,
    profilePic:profilePic||"",
    createdAt:Date.now()
  })

  document.getElementById('messageInput').value=''
  document.getElementById('imageInput').value=''
}

// messages
onSnapshot(query(collection(db,"messages"),orderBy("createdAt")),(snap)=>{
  const messagesDiv=document.getElementById('messages')
  messagesDiv.innerHTML=""

  snap.forEach(doc=>{
    const data=doc.data()

    const msg=document.createElement('div')
    msg.className='message'

    const avatar=document.createElement(data.profilePic?'img':'div')
    avatar.className='avatar'
    if(data.profilePic){
      avatar.src=data.profilePic
      avatar.onclick=()=>openImage(data.profilePic)
    }

    const bubble=document.createElement('div')
    bubble.className='bubble'

    bubble.innerHTML=`<div class="username">${data.user}</div>`

    if(data.text){
      const t=document.createElement('div')
      t.textContent=data.text
      bubble.appendChild(t)
    }

    if(data.image){
      const img=document.createElement('img')
      img.src=data.image
      img.onclick=()=>openImage(data.image)
      bubble.appendChild(img)
    }

    msg.appendChild(avatar)
    msg.appendChild(bubble)
    messagesDiv.appendChild(msg)
  })

  messagesDiv.scrollTop=messagesDiv.scrollHeight
})
</script>

</body>
</html>
