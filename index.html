<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styled Chat</title>

<style>
:root{--bg:#0a0a0a;--panel:#121212;--accent:#ffd400;--text:#fff}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:var(--text);overflow:hidden}

.container{display:flex;flex-direction:column;height:100vh}

.top-bar{display:flex;gap:10px;padding:10px;background:var(--panel)}
.top-bar input{padding:8px;border:none;border-radius:8px;background:#1c1c1c;color:white}

.chat{display:flex;flex-direction:column;height:100%}
.messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:20px}
.message{display:flex;gap:10px;max-width:650px;width:100%;margin:8px 0}
.avatar{width:36px;height:36px;border-radius:50%;background:#222;object-fit:cover}
.bubble{background:var(--panel);padding:12px 16px;border-radius:20px;width:100%}
.username{color:var(--accent);font-size:12px;margin-bottom:4px}
.bubble img{margin-top:8px;max-width:100%;border-radius:10px}

.input-area{display:flex;gap:10px;padding:10px;background:var(--panel);align-items:center}
.profile-preview{width:34px;height:34px;border-radius:50%;background:#222;object-fit:cover}
.input-box{flex:1;display:flex;background:#1c1c1c;border-radius:30px;padding:6px 10px}
.input-box input{flex:1;background:transparent;border:none;color:white}
.plus{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer}
.hidden-file{display:none}
button{padding:10px 16px;border:none;border-radius:20px;background:var(--accent)}
</style>
</head>
<body>

<div class="container">

<div class="top-bar">
  <input type="text" id="username" placeholder="Enter username">
  <img id="profilePreview" class="profile-preview">
  <input type="file" id="profileInput">
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" id="messageInput" placeholder="Type message">
      <div class="plus" id="uploadBtn">+</div>
    </div>

    <input type="file" id="imageInput" class="hidden-file">
    <button id="sendBtn">Send</button>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// FIREBASE
const firebaseConfig={
  apiKey:"AIzaSy...",
  authDomain:"chat-a48a1.firebaseapp.com",
  projectId:"chat-a48a1"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

// SUPABASE
const supabase=createClient(
  "https://gsahyfawfxjpfxcqpjvk.supabase.co",
  "YOUR_KEY_HERE"
);

let profilePic="";

// PROFILE UPLOAD
document.getElementById('profileInput').addEventListener('change', async function(){
  const file=this.files[0];
  if(!file) return;

  const fileName=Date.now()+"_"+file.name;

  const { error } = await supabase.storage.from('images').upload(fileName,file);
  if(error){ alert(error.message); return; }

  const { data }=supabase.storage.from('images').getPublicUrl(fileName);
  profilePic=data.publicUrl;

  document.getElementById('profilePreview').src=profilePic;
});

// IMAGE BUTTON
document.getElementById("uploadBtn").onclick=()=>{
  document.getElementById("imageInput").click();
};

// SEND MESSAGE
async function sendMessage(){
  const text=document.getElementById('messageInput').value;
  const username=document.getElementById('username').value || "Anonymous";
  const file=document.getElementById('imageInput').files[0];

  let imageUrl="";

  if(file){
    const fileName=Date.now()+"_"+file.name;

    const { error } = await supabase.storage.from('images').upload(fileName,file);
    if(error){ alert(error.message); return; }

    const { data }=supabase.storage.from('images').getPublicUrl(fileName);
    imageUrl=data.publicUrl;
  }

  if(!text && !imageUrl) return;

  await addDoc(collection(db,"messages"),{
    user:username,
    text:text,
    image:imageUrl,
    profilePic:profilePic,
    createdAt:Date.now()
  });

  document.getElementById('messageInput').value='';
  document.getElementById('imageInput').value='';
}

// FIX BUTTON (NO onclick bug anymore)
document.getElementById("sendBtn").onclick = sendMessage;

// REALTIME MESSAGES
const messagesDiv=document.getElementById('messages');
const q=query(collection(db,"messages"),orderBy("createdAt"));

onSnapshot(q,(snapshot)=>{
  messagesDiv.innerHTML="";

  snapshot.forEach(doc=>{
    const data=doc.data();

    const msg=document.createElement('div');
    msg.className='message';

    let avatar;
    if(data.profilePic){
      avatar=document.createElement('img');
      avatar.className='avatar';
      avatar.src=data.profilePic;
    } else {
      avatar=document.createElement('div');
      avatar.className='avatar';
    }

    const bubble=document.createElement('div');
    bubble.className='bubble';

    const user=document.createElement('div');
    user.className='username';
    user.innerText=data.user;

    bubble.appendChild(user);

    if(data.text){
      const t=document.createElement('div');
      t.innerText=data.text;
      bubble.appendChild(t);
    }

    if(data.image){
      const img=document.createElement('img');
      img.src=data.image;
      bubble.appendChild(img);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);

    messagesDiv.appendChild(msg);
  });

  messagesDiv.scrollTop=messagesDiv.scrollHeight;
});
</script>

</body>
</html>
