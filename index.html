<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styled Chat</title>

<style>
:root{--bg:#0a0a0a;--panel:#121212;--accent:#ffd400;--text:#fff}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:var(--text);overflow:hidden}

.container{display:flex;flex-direction:column;height:100vh}

.top-bar{padding:10px;background:var(--panel)}
.top-bar input{padding:8px;border:none;border-radius:8px;background:#1c1c1c;color:white}

.chat{display:flex;flex-direction:column;height:100%}
.messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:20px}
.message{display:flex;gap:10px;max-width:650px;width:100%;margin:8px 0}
.avatar{width:36px;height:36px;border-radius:50%;background:#222}
.bubble{background:var(--panel);padding:12px 16px;border-radius:20px;width:100%}
.username{color:var(--accent);font-size:12px;margin-bottom:4px}

.input-area{display:flex;gap:10px;padding:10px;background:var(--panel)}
.input-box{flex:1;display:flex;background:#1c1c1c;border-radius:30px;padding:6px 10px}
.input-box input{flex:1;background:transparent;border:none;color:white}
button{background:var(--accent);border:none;padding:10px 16px;border-radius:20px}
</style>
</head>
<body>

<div class="container">

<div class="top-bar">
  <input type="text" id="username" placeholder="Enter username">
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" id="messageInput" placeholder="Type message">
    </div>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyBXTxZKC3gW1ZTq6iwxx6Cw5sfkyAy9RYA",authDomain:"chat-a48a1.firebaseapp.com",projectId:"chat-a48a1"}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

// MAKE GLOBAL (fix your error)
window.sendMessage = async function(){
  const text=document.getElementById('messageInput').value
  const username=document.getElementById('username').value || "Anonymous"

  if(!text) return

  await addDoc(collection(db,"messages"),{
    user:username,
    text:text,
    createdAt:Date.now()
  })

  document.getElementById('messageInput').value=''
}

const messagesDiv=document.getElementById('messages')
const q=query(collection(db,"messages"),orderBy("createdAt"))

onSnapshot(q,(snapshot)=>{
  messagesDiv.innerHTML=""

  snapshot.forEach(doc=>{
    const data=doc.data()

    const msg=document.createElement('div')
    msg.className='message'

    const avatar=document.createElement('div')
    avatar.className='avatar'

    const bubble=document.createElement('div')
    bubble.className='bubble'

    const user=document.createElement('div')
    user.className='username'
    user.innerText=data.user

    const t=document.createElement('div')
    t.innerText=data.text

    bubble.appendChild(user)
    bubble.appendChild(t)

    msg.appendChild(avatar)
    msg.appendChild(bubble)

    messagesDiv.appendChild(msg)
  })

  messagesDiv.scrollTop=messagesDiv.scrollHeight
})
</script>

</body>
</html>
