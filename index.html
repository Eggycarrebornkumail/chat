<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KP Chat made by kumail nathan is chudmaxxer</title>

<style>
:root{--bg:#0a0a0a;--panel:#121212;--accent:#ffd400;--text:#fff}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  overflow:hidden;
}

.container{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* username */
.username-set{
  padding:10px;
  background:var(--panel);
}
.username-set input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#1c1c1c;
  color:white;
}

/* chat */
.chat{
  display:flex;
  flex-direction:column;
  height:100%;
  min-height:0;
}

.messages{
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.message{
  display:flex;
  gap:10px;
  max-width:650px;
  width:100%;
  margin:8px 0;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#222;
  object-fit:cover;
  cursor:pointer;
}

.bubble{
  background:var(--panel);
  padding:12px 16px;
  border-radius:20px;
  width:100%;
}

.username{
  color:var(--accent);
  font-size:12px;
  margin-bottom:4px;
}

.bubble img{
  margin-top:8px;
  max-width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* input */
.input-area{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:var(--panel);
  position:sticky;
  bottom:0;
}

.profile-section{
  display:flex;
  align-items:center;
  gap:8px;
}

.profile-preview{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  background:#222;
  cursor:pointer;
}

.profile-label{
  padding:6px 10px;
  border-radius:20px;
  background:#1c1c1c;
  cursor:pointer;
  font-size:12px;
}

.profile-section input{display:none}

.input-box{
  flex:1;
  display:flex;
  background:#1c1c1c;
  border-radius:30px;
  padding:6px 10px;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  color:white;
}

.plus{
  width:34px;
  height:34px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

button.send{
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:var(--accent);
}

/* modal */
#imageModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#imageModal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="chat">

<div class="username-set">
  <input type="text" id="usernameInput" placeholder="Enter username">
</div>

<div class="messages" id="messages"></div>

<div class="input-area">

  <!-- ✅ PROFILE SECTION BACK -->
  <div class="profile-section">
    <img id="profilePreview" class="profile-preview">
    <label class="profile-label" for="profileInput">Profile</label>
    <input type="file" id="profileInput">
  </div>

  <div class="input-box">
    <input type="text" id="messageInput" placeholder="Type message">
    <div class="plus" onclick="document.getElementById('imageInput').click()">+</div>
  </div>

  <input type="file" id="imageInput" class="hidden-file">
  <button class="send" onclick="sendMessage()">Send</button>
</div>

</div>
</div>

<!-- modal -->
<div id="imageModal">
  <img id="modalImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const firebaseConfig={apiKey:"AIza...",authDomain:"chat-a48a1.firebaseapp.com",projectId:"chat-a48a1"}
const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const supabase=createClient("https://gsahyfawfxjpfxcqpjvk.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzYWh5ZmF3ZnhqcGZ4Y3FwanZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDYyMDYsImV4cCI6MjA4OTQyMjIwNn0.GpbGst-tN8ONHifaXXb-Ehn8JgxWJ3q7w3hf4b8_AxY")

let profilePic=""

// username save
const usernameInput=document.getElementById('usernameInput')
const saved=localStorage.getItem("chatUsername")
if(saved) usernameInput.value=saved

usernameInput.addEventListener("input",()=>{
  localStorage.setItem("chatUsername",usernameInput.value)
})

// modal
const modal=document.getElementById("imageModal")
const modalImg=document.getElementById("modalImg")

function openImage(src){
  modal.style.display="flex"
  modalImg.src=src
}

modal.onclick=()=>modal.style.display="none"

// profile upload
document.getElementById('profileInput').addEventListener('change',async function(){
  const file=this.files[0]
  if(file){
    const name=Date.now()+"_"+file.name
    await supabase.storage.from('images').upload(name,file)
    const { data }=supabase.storage.from('images').getPublicUrl(name)
    profilePic=data.publicUrl
    document.getElementById('profilePreview').src=profilePic
  }
})

// send
window.sendMessage=async function(){
  const text=document.getElementById('messageInput').value
  const file=document.getElementById('imageInput').files[0]
  const username=usernameInput.value||"Anonymous"

  let imageUrl=""

  if(file){
    const name=Date.now()+"_"+file.name
    await supabase.storage.from('images').upload(name,file)
    const { data }=supabase.storage.from('images').getPublicUrl(name)
    imageUrl=data.publicUrl
  }

  if(!text&&!imageUrl)return

  await addDoc(collection(db,"messages"),{
    user:username,
    text:text,
    image:imageUrl,
    profilePic:profilePic||"",
    createdAt:Date.now()
  })

  document.getElementById('messageInput').value=''
  document.getElementById('imageInput').value=''
}

// messages
onSnapshot(query(collection(db,"messages"),orderBy("createdAt")),(snap)=>{
  const messagesDiv=document.getElementById('messages')
  messagesDiv.innerHTML=""

  snap.forEach(doc=>{
    const data=doc.data()

    const msg=document.createElement('div')
    msg.className='message'

    const avatar=document.createElement(data.profilePic?'img':'div')
    avatar.className='avatar'
    if(data.profilePic){
      avatar.src=data.profilePic
      avatar.onclick=()=>openImage(data.profilePic)
    }

    const bubble=document.createElement('div')
    bubble.className='bubble'

    const user=document.createElement('div')
    user.className='username'
    user.innerText=data.user

    bubble.appendChild(user)

    if(data.text){
      const t=document.createElement('div')
      t.innerText=data.text
      bubble.appendChild(t)
    }

    if(data.image){
      const img=document.createElement('img')
      img.src=data.image
      img.onclick=()=>openImage(data.image)
      bubble.appendChild(img)
    }

    msg.appendChild(avatar)
    msg.appendChild(bubble)
    messagesDiv.appendChild(msg)
  })

  messagesDiv.scrollTop=messagesDiv.scrollHeight
})
</script>

</body>
</html>
